<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gradient-to-br from-gray-900 to-black flex justify-center items-center h-screen">

    <div class="bg-gray-800 w-[340px] p-5 rounded-2xl shadow-2xl">

      
        <input type="text" readonly
        class="w-full h-14 mb-5 rounded-lg bg-gray-900  text-right text-3xl px-3 outline-none shadow-inner text-green-700" placeholder="0">

        
        <div class="flex flex-col gap-4">

            
            <div class="flex justify-between">
                <button class="w-[60px] h-[60px] rounded-xl bg-gray-600 text-white text-lg font-bold flex items-center justify-center hover:scale-105 hover:brightness-110 active:scale-95 transition-all duration-150">C</button>
                <button class="w-[60px] h-[60px] rounded-xl bg-gray-600 text-white text-lg font-bold flex items-center justify-center hover:scale-105 hover:brightness-110 active:scale-95 transition-all duration-150">%</button>
                <button class="w-[60px] h-[60px] rounded-xl bg-gray-600 text-white text-lg font-bold flex items-center justify-center hover:scale-105 hover:brightness-110 active:scale-95 transition-all duration-150">/</button>
                <button class="w-[60px] h-[60px] rounded-xl bg-gray-600 text-white text-lg font-bold flex items-center justify-center hover:scale-105 hover:brightness-110 active:scale-95 transition-all duration-150">*</button>
            </div>

           
            <div class="flex justify-between">
                <button class="w-[60px] h-[60px] rounded-xl bg-gray-600 text-white text-lg font-bold flex items-center justify-center hover:scale-105 hover:brightness-110 active:scale-95 transition-all duration-150">7</button>
                <button class="w-[60px] h-[60px] rounded-xl bg-gray-600 text-white text-lg font-bold flex items-center justify-center hover:scale-105 hover:brightness-110 active:scale-95 transition-all duration-150">8</button>
                <button class="w-[60px] h-[60px] rounded-xl bg-gray-600 text-white text-lg font-bold flex items-center justify-center hover:scale-105 hover:brightness-110 active:scale-95 transition-all duration-150">9</button>
                <button class="w-[60px] h-[60px] rounded-xl bg-gray-600 text-white text-lg font-bold flex items-center justify-center hover:scale-105 hover:brightness-110 active:scale-95 transition-all duration-150">-</button>
            </div>

            
            <div class="flex justify-between">
                <button class="w-[60px] h-[60px] rounded-xl bg-gray-600 text-white text-lg font-bold flex items-center justify-center hover:scale-105 hover:brightness-110 active:scale-95 transition-all duration-150">4</button>
                <button class="w-[60px] h-[60px] rounded-xl bg-gray-600 text-white text-lg font-bold flex items-center justify-center hover:scale-105 hover:brightness-110 active:scale-95 transition-all duration-150">5</button>
                <button class="w-[60px] h-[60px] rounded-xl bg-gray-600 text-white text-lg font-bold flex items-center justify-center hover:scale-105 hover:brightness-110 active:scale-95 transition-all duration-150">6</button>
                <button class="w-[60px] h-[60px] rounded-xl bg-gray-600 text-white text-lg font-bold flex items-center justify-center hover:scale-105 hover:brightness-110 active:scale-95 transition-all duration-150">+</button>
            </div>

            <div class="flex justify-between">
                <button class="w-[60px] h-[60px] rounded-xl bg-gray-600 text-white text-lg font-bold flex items-center justify-center hover:scale-105 hover:brightness-110 active:scale-95 transition-all duration-150">1</button>
                <button class="w-[60px] h-[60px] rounded-xl bg-gray-600 text-white text-lg font-bold flex items-center justify-center hover:scale-105 hover:brightness-110 active:scale-95 transition-all duration-150">2</button>
                <button class="w-[60px] h-[60px] rounded-xl bg-gray-600 text-white text-lg font-bold flex items-center justify-center hover:scale-105 hover:brightness-110 active:scale-95 transition-all duration-150">3</button>
                <button class="w-[60px] h-[60px] rounded-xl bg-gray-600 text-white text-lg font-bold flex items-center justify-center hover:scale-105 hover:brightness-110 active:scale-95 transition-all duration-150">=</button>
            </div>

          
            <div class="flex justify-between">
                <button class="btn w-[48%] w-[60px] h-[60px] rounded-xl bg-gray-600 text-white text-lg font-bold flex items-center justify-center hover:scale-105 hover:brightness-110 active:scale-95 transition-all duration-150">0</button>
                <button class="btn w-[60px] h-[60px] rounded-xl bg-gray-600 text-white text-lg font-bold flex items-center justify-center hover:scale-105 hover:brightness-110 active:scale-95 transition-all duration-150">.</button>
            </div>

        </div>
    </div>
<script src="caluclator.js"></script>
</body>
</html>
